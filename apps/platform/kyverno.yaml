apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: "3.8.2"
    helm:
      releaseName: kyverno
      values: |
        metricsConfig:
          enabled: true
        admissionController:
          serviceMonitor:
            enabled: true
            namespace: kyverno
            interval: 30s
        backgroundController:
          serviceMonitor:
            enabled: true
            namespace: kyverno
            interval: 30s
        reportsController:
          serviceMonitor:
            enabled: true
            namespace: kyverno
            interval: 30s
        cleanupController:
          serviceMonitor:
            enabled: true
            namespace: kyverno
            interval: 30s
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  ignoreDifferences:
  - group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    jqPathExpressions:
    - .status
    - .spec.conversion.webhook.clientConfig.caBundle
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        naas.platform/observability: "true"
        release: prometheus
    syncOptions:
      - CreateNamespace=true
      - Replace=true
      - ServerSideApply=true