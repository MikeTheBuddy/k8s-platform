apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jupyterhub
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://jupyterhub.github.io/helm-chart/
    chart: jupyterhub
    targetRevision: "4.4.0"
    helm:
      releaseName: jupyterhub
      values: |
        cull:
          enabled: true
          timeout: 3600
          every: 300
          maxAge: 86400
        proxy:
          service:
            type: ClusterIP
        hub:
          config:
            JupyterHub:
              authenticator_class: dummy
        singleuser:
          storage:
            type: none
          cloudMetadata:
            blockWithIptables: false
          profileList:
          - display_name: "Standard Python"
            description: "Basic Python 3 environment for interactive work"
            default: true
            kubespawner_override:
              image: jupyter/base-notebook:latest
            profile_options:
              resources:
                display_name: "Resource Allocation"
                choices:
                  small:
                    display_name: "Small - 0.5 CPU, 512MB RAM"
                    default: true
                    kubespawner_override:
                      cpu_limit: 0.5
                      cpu_guarantee: 0.1
                      mem_limit: "512M"
                      mem_guarantee: "256M"
                  medium:
                    display_name: "Medium - 1 CPU, 2GB RAM"
                    kubespawner_override:
                      cpu_limit: 1
                      cpu_guarantee: 0.25
                      mem_limit: "2G"
                      mem_guarantee: "1G"
                  large:
                    display_name: "Large - 2 CPU, 4GB RAM"
                    kubespawner_override:
                      cpu_limit: 2
                      cpu_guarantee: 0.5
                      mem_limit: "4G"
                      mem_guarantee: "2G"
          - display_name: "Data Science"
            description: "Python with pandas, numpy, scipy, matplotlib"
            kubespawner_override:
              image: quay.io/jupyter/datascience-notebook:latest
              cpu_limit: 2
              cpu_guarantee: 0.5
              mem_limit: "4G"
              mem_guarantee: "2G"
  destination:
    server: https://kubernetes.default.svc
    namespace: jupyterhub
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        naas.platform/observability: "true"
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/enforce-version: latest
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true