apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: generate-user-kai-queue
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  evaluation:
    synchronize:
      enabled: true
    generateExisting:
      enabled: true
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      resources: ["namespaces"]
      operations: ["CREATE", "UPDATE"]
  matchConditions:
  - name: is-user-namespace
    expression: >
      'naas.platform/user-namespace' in object.metadata.labels &&
      object.metadata.labels['naas.platform/user-namespace'] == 'true'
  - name: is-not-special-tier
    expression: >
      !('naas.platform/tier' in object.metadata.labels) ||
      object.metadata.labels['naas.platform/tier'] != 'special'
  variables:
  - name: nsName
    expression: "object.metadata.name"
  - name: tier
    expression: >
      'naas.platform/tier' in object.metadata.labels ?
      object.metadata.labels['naas.platform/tier'] :
      'free'
  - name: tierValues
    expression: >
      yaml.parse(globalContext.Get("naas-tier-config", "").items.filter(cm,
      cm.metadata.name == 'naas-tier-config')[0].data[variables.tier])
  - name: queue
    expression: >
      [
        {
          "kind": dyn("Queue"),
          "apiVersion": dyn("scheduling.run.ai/v2"),
          "metadata": dyn({
            "name": string(variables.nsName)
          }),
          "spec": dyn({
            "parentQueue": dyn("normal-root"),
            "resources": dyn({
              "cpu": dyn({
                "quota": int(string(variables.tierValues.kai.cpu)),
                "limit": int(string(variables.tierValues.kai.cpu)) * 2
              }),
              "memory": dyn({
                "quota": int(string(variables.tierValues.kai.memory)),
                "limit": int(string(variables.tierValues.kai.memory))
              })
            })
          })
        }
      ]
  generate:
  - expression: >
      generator.Apply(variables.nsName, variables.queue)