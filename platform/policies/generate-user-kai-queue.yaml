apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: generate-user-kai-queue
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  evaluation:
    synchronize:
      enabled: true
    generateExisting:
      enabled: true
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      resources: ["namespaces"]
      operations: ["CREATE", "UPDATE"]
  matchConditions:
  - name: is-user-namespace
    expression: >
      'naas.platform/user-namespace' in object.metadata.labels &&
      object.metadata.labels['naas.platform/user-namespace'] == 'true'
  - name: is-not-special-tier
    expression: >
      !('naas.platform/tier' in object.metadata.labels) ||
      object.metadata.labels['naas.platform/tier'] != 'special'
  variables:
  - name: nsName
    expression: "object.metadata.name"
  - name: tier
    expression: >
      'naas.platform/tier' in object.metadata.labels ?
      object.metadata.labels['naas.platform/tier'] :
      'free'
  - name: tierValues
    expression: >
      yaml.parse(
        variables.tier == 'free' ?
          resource.Get("v1", "configmaps", "kyverno", "naas-tier-config").data['free'] :
        variables.tier == 'standard' ?
          resource.Get("v1", "configmaps", "kyverno", "naas-tier-config").data['standard'] :
          resource.Get("v1", "configmaps", "kyverno", "naas-tier-config").data['pro']
      )
  - name: queue
    expression: >
      [
        {
          "kind": dyn("Queue"),
          "apiVersion": dyn("scheduling.run.ai/v2"),
          "metadata": dyn({
            "name": string(variables.nsName)
          }),
          "spec": dyn({
            "parentQueue": dyn("normal-root"),
            "resources": dyn({
              "cpu": dyn({
                "quota": dyn(variables.tierValues.kai.cpu),
                "limit": dyn(variables.tierValues.kai.cpu)
              }),
              "memory": dyn({
                "quota": dyn(variables.tierValues.kai.memory),
                "limit": dyn(variables.tierValues.kai.memory)
              })
            })
          })
        }
      ]
  generate:
  - expression: >
      generator.Apply("", variables.queue)