apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: generate-user-resource-quota
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  evaluation:
    synchronize:
      enabled: true
    generateExisting:
      enabled: true
  matchConstraints:
    resourceRules:
    - apiGroups: [""]
      apiVersions: ["v1"]
      resources: ["namespaces"]
      operations: ["CREATE", "UPDATE"]
  matchConditions:
  - name: is-user-namespace
    expression: >
      'naas.platform/user-namespace' in object.metadata.labels &&
      object.metadata.labels['naas.platform/user-namespace'] == 'true'
  - name: is-not-special-tier
    expression: >
      !('naas.platform/tier' in object.metadata.labels) ||
      object.metadata.labels['naas.platform/tier'] != 'special'
  variables:
  - name: nsName
    expression: "object.metadata.name"
  - name: tier
    expression: >
      'naas.platform/tier' in object.metadata.labels ?
      object.metadata.labels['naas.platform/tier'] :
      'free'
  - name: configData
    expression: >
      globalContext.Get("naas-tier-config", "").items.filter(cm,
      cm.metadata.name == 'naas-tier-config')[0].data
  - name: tierValues
    expression: >
      yaml.parse(
        variables.tier == 'free' ? variables.configData['free'] :
        variables.tier == 'standard' ? variables.configData['standard'] :
        variables.configData['pro']
      )
  - name: quota
    expression: >
      [
        {
          "kind": dyn("ResourceQuota"),
          "apiVersion": dyn("v1"),
          "metadata": dyn({
            "name": "tier-quota",
            "namespace": string(variables.nsName)
          }),
          "spec": dyn({
            "hard": dyn({
              "requests.cpu": dyn(string(variables.tierValues.cpu.request)),
              "limits.cpu": dyn(string(variables.tierValues.cpu.limit)),
              "requests.memory": dyn(string(variables.tierValues.memory.request)),
              "limits.memory": dyn(string(variables.tierValues.memory.limit))
            })
          })
        }
      ]
  generate:
  - expression: >
      generator.Apply(variables.nsName, variables.quota)